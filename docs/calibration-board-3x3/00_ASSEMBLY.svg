<svg xmlns="http://www.w3.org/2000/svg" width="210mm" height="297mm" viewBox="0 0 210 297">
<rect width="210" height="297" fill="white"/>
<text x="105" y="18" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold">KIRKET CALIBRATION BOARD — 3×3 A4 ASSEMBLY</text>
<text x="105" y="28" text-anchor="middle" font-family="Arial" font-size="4">Print all 9 sheets at 100% · Assemble with overlap · Calibrate · Remove</text>
<text x="105" y="36" text-anchor="middle" font-family="Arial" font-size="3.5">View from camera behind the stumps (front row = closest to camera)</text>
<rect x="28" y="50" width="50" height="70" fill="#f9fafb" stroke="#111" stroke-width="0.6"/>
<text x="53.0" y="78" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">A1</text>
<text x="53.0" y="90" text-anchor="middle" font-family="Arial" font-size="3">BACK-LEFT</text>
<rect x="82" y="50" width="50" height="70" fill="#f9fafb" stroke="#111" stroke-width="0.6"/>
<text x="107.0" y="78" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">A2</text>
<text x="107.0" y="90" text-anchor="middle" font-family="Arial" font-size="3">BACK-CENTER</text>
