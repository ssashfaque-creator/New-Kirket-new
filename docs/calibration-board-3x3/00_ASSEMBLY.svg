<text x="53.0" y="152" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">B1</text>
<text x="53.0" y="164" text-anchor="middle" font-family="Arial" font-size="3">MID-LEFT</text>
<rect x="82" y="124" width="50" height="70" fill="#f9fafb" stroke="#111" stroke-width="0.6"/>
<text x="107.0" y="152" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">B2</text>
<text x="107.0" y="164" text-anchor="middle" font-family="Arial" font-size="3">MID-CENTER</text>
<rect x="136" y="124" width="50" height="70" fill="#f9fafb" stroke="#111" stroke-width="0.6"/>
<text x="161.0" y="152" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">B3</text>
